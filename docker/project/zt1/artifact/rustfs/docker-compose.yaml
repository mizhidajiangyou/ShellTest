version: '3.4'
services:
  {{ NAME }}:
    image: {{ IMAGE }}
    deploy:
      resources:
        limits:
          cpus: "{{ CPU }}"
          memory: "{{ MEMORY }}"
    restart: always
    privileged: true
    container_name: {{ NAME }}
    environment:
      - TZ=Asia/Shanghai
      - RUSTFS_ROOT_USER={{ ACCESSKEY }}
      - RUSTFS_ROOT_PASSWORD={{ SECRETKEY }}
    hostname: {{ NAME }}
    volumes:
      - ./data:/data
    ports:
      - "{{ PORT }}:9000/tcp"
      - "{{ PORT_CONSOLE }}:9001/tcp"
    logging:
      driver: "json-file"
      options:
        max-size: "5M"
        max-file: "10"
    healthcheck:
      test: curl http://localhost:9000 || exit 1
      interval: 10s
      retries: 5
      timeout: 10s
      start_period: 10s
    networks:
      - {{ NETWORK_NAME }}
networks:
  {{ NETWORK_NAME }}:
    external: true
